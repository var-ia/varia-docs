<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="840" height="340">
  <defs>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
    <filter id="cardShadow" x="-4%" y="-10%" width="108%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <filter id="negShadow" x="-4%" y="-10%" width="108%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ef4444" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .hero-title { font-size: 20px; font-weight: 800; fill: #111827; }
    .hero-sub { font-size: 14px; fill: #4b5563; }
    .card-title { font-size: 13px; font-weight: 700; fill: #111827; }
    .card-desc { font-size: 11px; fill: #4b5563; }
    .neg-desc { font-size: 11px; fill: #dc2626; }
    .arrow-label { font-size: 11px; fill: #9ca3af; font-style: italic; }
  </style>

  <rect width="840" height="340" fill="#fafbfc" rx="8"/>

  <!-- Header -->
  <text x="420" y="42" text-anchor="middle" class="hero-title">Evidence, not truth.</text>
  <text x="420" y="66" text-anchor="middle" class="hero-sub">A deterministic claim-provenance engine for Wikipedia page histories</text>

  <line x1="200" y1="80" x2="640" y2="80" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Input: Wikipedia Page URL -->
  <rect x="60" y="115" width="160" height="70" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="60" y="115" width="160" height="24" rx="8" fill="#e5e7eb"/>
  <text x="140" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Input</text>
  <text x="140" y="160" text-anchor="middle" class="card-title">Wikipedia Page URL</text>
  <text x="140" y="177" text-anchor="middle" class="card-desc">Article title or full URL</text>

  <!-- Arrow -->
  <line x1="220" y1="150" x2="270" y2="150" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- Engine -->
  <rect x="280" y="100" width="280" height="100" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="280" y="100" width="280" height="28" rx="8" fill="#eef2ff"/>
  <text x="420" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">Provenance Engine</text>

  <!-- Three layers inside -->
  <rect x="296" y="136" width="82" height="20" rx="4" fill="#dbeafe"/>
  <text x="337" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">L1: Deterministic</text>

  <text x="392" y="150" font-size="14" fill="#9ca3af">→</text>

  <rect x="402" y="136" width="82" height="20" rx="4" fill="#ede9fe"/>
  <text x="443" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">L2: Model</text>

  <text x="498" y="150" font-size="14" fill="#9ca3af">→</text>

  <rect x="508" y="136" width="40" height="20" rx="4" fill="#d1fae5"/>
  <text x="528" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">L3</text>

  <text x="420" y="179" text-anchor="middle" class="card-desc">Evidence graph, claim lineage, source lineage, policy signals</text>

  <!-- Arrow -->
  <line x1="560" y1="150" x2="610" y2="150" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrowRight)"/>

  <!-- Output -->
  <rect x="620" y="115" width="180" height="70" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="620" y="115" width="180" height="24" rx="8" fill="#e5e7eb"/>
  <text x="710" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Output</text>
  <text x="710" y="160" text-anchor="middle" class="card-title">Layered Report</text>
  <text x="710" y="177" text-anchor="middle" class="card-desc">Evidence with provenance labels</text>

  <!-- What it is NOT -->
  <rect x="100" y="228" width="640" height="90" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1" filter="url(#negShadow)"/>
  <rect x="110" y="240" width="98" height="12" fill="#fecaca"/>
  <rect x="114" y="243" width="6" height="6" rx="1" fill="#ef4444"/>
  <text x="126" y="253" font-size="10" fill="#ef4444">WHAT IT IS NOT</text>

  <text x="130" y="275" class="neg-desc">✗ A truth detector</text>
  <text x="270" y="275" class="neg-desc">✗ An editor quality judge</text>
  <text x="430" y="275" class="neg-desc">✗ A prediction engine</text>
  <text x="130" y="300" class="neg-desc">✗ A sentiment analyzer</text>
  <text x="310" y="300" class="neg-desc">✗ A Wikipedia monitoring dashboard</text>
</svg>
